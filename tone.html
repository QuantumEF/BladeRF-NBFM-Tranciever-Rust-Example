<!DOCTYPE html>
<html>
  <head>
    <title>Arbitrary Waveform Buffer</title>
  </head>
  <body>
    <button class="play-button" onclick="myTone()">Play Tone</button>
    <button onclick="myWs()">Ws</button>

    <script></script>
    <script>
      async function myTone() {
        const audioCtx = new AudioContext();

        await audioCtx.audioWorklet.addModule("tone_thingy.js");
        const randomNoiseNode = new AudioWorkletNode(audioCtx, "ws-processor");
        randomNoiseNode.connect(audioCtx.destination);
      }

      function myWs() {
        const socket = new WebSocket("ws://localhost:1234");

        socket.addEventListener("open", (event) => {
          console.log("Connected to WebSocket server");
          socket.send("Hello from client");
        });

        socket.addEventListener("message", (event) => {
          console.log("Message from server:", event.data);
        });

        socket.addEventListener("close", (event) => {
          console.log("Disconnected from WebSocket server");
        });

        socket.addEventListener("error", (event) => {
          console.error("WebSocket error:", event);
        });
      }
    </script>
  </body>
</html>
